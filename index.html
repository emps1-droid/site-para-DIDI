<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para DIDI Especial</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="main-page" class="view">
        <header>
            <h1 class="top-message">DIDI, você é muito especial!</h1>
        </header>

        <main>
            <div class="photo-container">
                <!-- Espaço reservado para a foto -->
                <div class="photo-placeholder">
                    <span>Sua Foto Aqui</span>
                    <img src="WhatsApp%20Image%202026-03-26%20at%2021.24.43.jpeg" alt="DIDI">
                </div>
            </div>

            <div class="actions">
                <button id="web-button" class="btn">Teias de Aranha!</button>
                <button id="next-page-btn" class="btn">Clique para uma surpresa</button>
            </div>
        </main>

        <footer>
            <div class="bottom-message">
                <p>DIDI, você é um cara muito especial pra mim, já me ajudou muito nessa vida. Valeu por ser um cara incrível.</p>
            </div>
        </footer>
    </div>

    <div id="secret-page" class="view hidden">
        <div class="centered-message">
            <h1>DIDI bundudo</h1>
            <button id="back-btn" class="btn-small">Voltar</button>
        </div>
    </div>

    <canvas id="spider-canvas"></canvas>

    <script src="scrypt.js"></script>
</body>
</html>
